<!DOCTYPE html>
<html>
<head>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        /* Changed to white to help troubleshoot the black screen */
        body { margin: 0; background-color: #ffffff; } 
        model-viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <model-viewer 
        id="twin-model"
        src="NHHB 1.01 3D for github.glb" 
        camera-controls 
        shadow-intensity="1">
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#twin-model');

        window.addEventListener("message", (event) => {
            if (event.data.action === 'color_update' && modelViewer.model) {
                const materials = modelViewer.model.materials;
                const colorMap = {
                    'GREEN': [0, 1, 0, 1],
                    'YELLOW': [1, 0.8, 0, 1],
                    'RED': [1, 0, 0, 1]
                };
                const chosenColor = colorMap[event.data.colorName] || [0.5, 0.5, 0.5, 1];

                materials.forEach(mat => {
                    // This colors EVERYTHING temporarily to prove it works
                    mat.pbrMetallicRoughness.setBaseColorFactor(chosenColor);
                });
            }
        }, false);
    </script>
</body>
</html>
