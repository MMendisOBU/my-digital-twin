<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Digital Twin</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #1a1a1a; }
        model-viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
<script>
    const modelViewer = document.querySelector('model-viewer');

    window.addEventListener("message", (event) => {
        if (event.data.action === 'color_update') {
            // We wait for the model to be ready
            if (!modelViewer.model) return; 

            const materials = modelViewer.model.materials;
            const colorMap = {
                'GREEN': [0, 1, 0, 1],
                'YELLOW': [1, 0.8, 0, 1],
                'RED': [1, 0, 0, 1]
            };

            const chosenColor = colorMap[event.data.colorName] || [0.5, 0.5, 0.5, 1];

            // This tells the model: "Paint EVERYTHING that looks like a floor or wall"
            materials.forEach(mat => {
                // This is a 'catch-all'. It looks for common Revit material names.
                const name = mat.name.toLowerCase();
                if (name.includes('floor') || name.includes('wall') || name.includes('generic')) {
                    mat.pbrMetallicRoughness.setBaseColorFactor(chosenColor);
                }
            });
        }
    }, false);
</script>
