<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseUrl = 'https://codbuvljesxjybhkvcit.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvZGJ1dmxqZXN4anliaGt2Y2l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTU1OTEsImV4cCI6MjA5MDAzMTU5MX0.ScHKUG2VcFwCp5VS9x9oB6ZYSQ00cgZ2JoduRZ01Mpc';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function updateDigitalTwin() {
        console.log("Querying optimized sensors table...");
        
        // We fetch the latest 10 rows to ensure we get the newest data for our 3 sensors
        const { data, error } = await _supabase
            .from('sensors') 
            .select('sensor_id, temperature, humidity, co2, timestamp')
            .order('timestamp', { ascending: false })
            .limit(10); 

        if (error) {
            console.error("Database Error:", error.message);
            return;
        }

        // Create a set to keep track of sensors we've already updated 
        // (so we only show the newest reading for each ID)
        const updatedSensors = new Set();

        data.forEach(row => {
            if (!updatedSensors.has(row.sensor_id)) {
                const element = document.getElementById(`data-${row.sensor_id}`);
                if (element) {
                    element.innerHTML = `
                        <div style="line-height: 1.4;">
                            <strong style="color: #007bff; font-size: 10px;">ID: ${row.sensor_id.slice(-4)}</strong><br>
                            <b>🌡️ ${row.temperature?.toFixed(1) || '--'}°C</b><br>
                            <b>💧 ${row.humidity?.toFixed(1) || '--'}%</b><br>
                            <b>☁️ ${row.co2?.toFixed(0) || '--'} ppm</b>
                        </div>
                    `;
                    updatedSensors.add(row.sensor_id);
                }
            }
        });
    }

    // Initial load and then every 15 seconds
    updateDigitalTwin();
    setInterval(updateDigitalTwin, 15000);
</script>
