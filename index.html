<script>
    const supabaseUrl = 'https://codbuvljesxjybhkvcit.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvZGJ1dmxqZXN4anliaGt2Y2l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTU1OTEsImV4cCI6MjA5MDAzMTU5MX0.ScHKUG2VcFwCp5VS9x9oB6ZYSQ00cgZ2JoduRZ01Mpc';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function updateData() {
        console.log("Fetching live sensor data...");
        
        const { data, error } = await _supabase
            .from('sensors') 
            .select('sensor_id, temperature, humidity, co2, timestamp')
            .order('timestamp', { ascending: false }); // Changed from created_at to timestamp

        if (error) {
            console.error("Supabase Error:", error.message);
            return;
        }

        if (data) {
            data.forEach(row => {
                const element = document.getElementById(`data-${row.sensor_id}`);
                if (element) {
                    // This now shows Temperature, Humidity, and CO2!
                    element.innerHTML = `
                        <div style="text-align: left;">
                            <small>ID: ...${row.sensor_id.slice(-4)}</small><br>
                            <b>Temp:</b> ${row.temperature}°C<br>
                            <b>Hum:</b> ${row.humidity}%<br>
                            <b>CO2:</b> ${row.co2} ppm
                        </div>
                    `;
                }
            });
        }
    }

    updateData();
    setInterval(updateData, 10000); // Updates every 10 seconds
</script>
