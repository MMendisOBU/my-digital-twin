<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Digital Twin</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #1a1a1a; }
        model-viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
<script>
    const modelViewer = document.querySelector('model-viewer');

    window.addEventListener("message", (event) => {
        if (event.data.action === 'color_update') {
            const materials = modelViewer.model.materials;
            
            // Map the text from Supabase to 3D colors [R, G, B, A]
            const colorMap = {
                'GREEN': [0, 1, 0, 1],
                'YELLOW': [1, 0.8, 0, 1],
                'RED': [1, 0, 0, 1]
            };

            const chosenColor = colorMap[event.data.colorName] || [0.5, 0.5, 0.5, 1];

            materials.forEach(mat => {
                // This will color the floor or walls to show the room status
                if (mat.name.toLowerCase().includes('floor') || mat.name.toLowerCase().includes('wall')) {
                    mat.pbrMetallicRoughness.setBaseColorFactor(chosenColor);
                }
            });
        }
    }, false);
</script>
