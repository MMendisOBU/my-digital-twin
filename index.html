<!DOCTYPE html>
<html>
<head>
    <title>My Digital Twin</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

    <model-viewer id="twin-model" src="your-model.glb" ar camera-controls touch-action="pan-y" style="width: 100%; height: 500px;">
    </model-viewer>

    <script>
        const viewer = document.querySelector('#twin-model');

        viewer.addEventListener('load', () => {
            console.log("Model loaded successfully!");
        });

        viewer.addEventListener('click', (event) => {
            const hit = viewer.materialFromPoint(event.clientX, event.clientY);
            if (hit) {
                // This will finally show you the metadata!
                alert("Object Detected! Internal Name: " + hit.name);
            }
        });
    </script>

</body>
</html>
