<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhD Digital Twin - Live Dashboard</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { margin: 0; background-color: #f4f4f4; font-family: sans-serif; }
        model-viewer { width: 100%; height: 98vh; display: block; }
        
        .HotspotAnnotation {
            background: #ffffff;
            border: 2px solid #007bff;
            border-radius: 6px;
            padding: 8px;
            font-size: 11px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            pointer-events: none; /* Keeps the label from blocking mouse clicks */
        }
    </style>
</head>
<body>

<model-viewer 
    src="your-model.glb"
    camera-controls
    
    /* 1. THE REVISIT STABILITY: Locks the floor at 0 degrees so you don't flip */
    min-camera-orbit="auto 0deg auto"
    max-camera-orbit="auto 90deg auto"
    
    /* 2. THE PIVOT: Set this to the center of your floor plan at height 0 */
    /* If your model disappears, try "auto auto auto" first */
    camera-target="0m 0m 0m" 
    
    /* 3. THE FEEL: Matches your trainer's smooth movement */
    interpolation-decay="30"
    
    /* 4. ENABLE PANNING: Allows you to move across the rooms (Right Click / Two Fingers) */
    enable-pan
    
    interaction-prompt="none"
    shadow-intensity="1">
</model-viewer>

    <script>
        const supabaseUrl = 'https://codbuvljesxjybhkvcit.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvZGJ1dmxqZXN4anliaGt2Y2l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTU1OTEsImV4cCI6MjA5MDAzMTU5MX0.ScHKUG2VcFwCp5VS9x9oB6ZYSQ00cgZ2JoduRZ01Mpc';
        
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function updateDigitalTwin() {
            try {
                const { data, error } = await _supabase
                    .from('sensors') 
                    .select('sensor_id, temperature, humidity, co2, timestamp')
                    .order('timestamp', { ascending: false })
                    .limit(20);

                if (error) throw error;

                const updatedSensors = new Set();

                data.forEach(row => {
                    if (!updatedSensors.has(row.sensor_id)) {
                        const element = document.getElementById(`data-${row.sensor_id}`);
                        if (element) {
                            element.innerHTML = `
                                <strong>ID: ${row.sensor_id.slice(-4)}</strong><br>
                                Temp: ${row.temperature?.toFixed(1) || '--'}°C<br>
                                Hum: ${row.humidity?.toFixed(1) || '--'}%<br>
                                CO2: ${row.co2?.toFixed(0) || '--'} ppm
                            `;
                            updatedSensors.add(row.sensor_id);
                        }
                    }
                });
            } catch (err) {
                console.error("Connection error:", err.message);
            }
        }

        updateDigitalTwin();
        setInterval(updateDigitalTwin, 15000);
    </script>
</body>
</html>
