<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhD Digital Twin - Coordinate Mapping</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { margin: 0; background-color: #f4f4f4; font-family: sans-serif; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; display: block; }
        
        .HotspotAnnotation {
            background: #ffffff;
            border: 2px solid #007bff;
            border-radius: 6px;
            padding: 8px;
            font-size: 11px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            pointer-events: none;
        }

        #picker-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            font-family: monospace;
            border: 1px solid #444;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="picker-info">
    <strong>COORDINATE PICKER MODE</strong><br>
    1. Right-Click + Drag to Pan.<br>
    2. Click model to get XYZ.<br>
    <span id="coords-output" style="color: white;">Waiting for click...</span>
</div>

<model-viewer 
    id="twin-model"
    src="https://cdn.jsdelivr.net/gh/MMendisOBU/my-digital-twin@main/model.glb" 
    camera-controls 
    interaction-prompt="none"
    min-polar-angle="0deg" 
    max-polar-angle="90deg"
    camera-target="auto auto auto"
    interpolation-decay="30"
    enable-pan
    shadow-intensity="1"
    style="width: 100vw; height: 100vh;">

    <button class="Hotspot" slot="hotspot-1" data-position="70.25m 224.10m 351.23m" data-normal="0m 0m 1m">
        <div class="HotspotAnnotation">2.02/01</div>
    </button>
    <button class="Hotspot" slot="hotspot-2" data-position="70.50m 219.37m 351.23m" data-normal="0m 0m 1m">
        <div class="HotspotAnnotation">2.02/02</div>
    </button>
    <button class="Hotspot" slot="hotspot-3" data-position="70.51m 214.92m 351.16m" data-normal="0m 0m 1m">
        <div class="HotspotAnnotation">2.02/03</div>
    </button>

    <button class="Hotspot" slot="hotspot-4" data-position="60.97m 226.59m 353.72m" data-normal="-1m 0m 0m">
        <div id="data-S1" class="HotspotAnnotation">S1: Loading...</div>
    </button>
    <button class="Hotspot" slot="hotspot-5" data-position="38.53m 238.26m 353.87m" data-normal="1m 0m 0m">
        <div id="data-S2" class="HotspotAnnotation">S2: Loading...</div>
    </button>
    <button class="Hotspot" slot="hotspot-6" data-position="85.36m 237.47m 352.29m" data-normal="-1m 0m 0m">
        <div id="data-S3" class="HotspotAnnotation">S3: Loading...</div>
    </button>

</model-viewer>

<script>
    const mv = document.querySelector("#twin-model");
    const output = document.querySelector("#coords-output");

    // 1. COORDINATE PICKER LOGIC
    mv.addEventListener("click", (ev) => {
        const rect = mv.getBoundingClientRect();
        const hit = mv.positionAndNormalFromPoint(ev.clientX - rect.left, ev.clientY - rect.top);
        
        if (hit) {
            const coordString = `${hit.position.x.toFixed(2)}m ${hit.position.y.toFixed(2)}m ${hit.position.z.toFixed(2)}m`;
            output.innerText = coordString;
            navigator.clipboard.writeText(coordString);
        }
    });

    // 2. SUPABASE DATA LOGIC
    const _supabase = supabase.createClient('https://codbuvljesxjybhkvcit.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvZGJ1dmxqZXN4anliaGt2Y2l0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTU1OTEsImV4cCI6MjA5MDAzMTU5MX0.ScHKUG2VcFwCp5VS9x9oB6ZYSQ00cgZ2JoduRZ01Mpc');

    async function updateDigitalTwin() {
        try {
            const { data, error } = await _supabase
                .from('sensors') 
                .select('*')
                .order('timestamp', { ascending: false })
                .limit(20);

            if (error) throw error;

            data.forEach(row => {
                const element = document.getElementById(`data-${row.sensor_id}`);
                if (element) {
                    element.innerHTML = `
                        <strong>ID: ${row.sensor_id}</strong><br>
                        Temp: ${row.temperature?.toFixed(1)}°C<br>
                        Hum: ${row.humidity?.toFixed(1)}%<br>
                        CO2: ${row.co2?.toFixed(0)} ppm
                    `;
                }
            });
        } catch (err) {
            console.error("Supabase Error:", err.message);
        }
    }

    setInterval(updateDigitalTwin, 15000);
    updateDigitalTwin();
</script>

</body>
</html>
